---
- name: Actualizar apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Instalar Nginx y Certbot
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present

# 🔹 Crear logs por sitio
- name: Crear directorio de logs por sitio
  file:
    path: "/var/log/nginx/{{ item.name }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop: "{{ vhosts }}"

# 🔹 Backup de configs actuales (rollback)
- name: Backup de configuración actual de nginx
  copy:
    src: "/etc/nginx/sites-available/"
    dest: "/etc/nginx/backup_sites_available/"
    remote_src: yes
  ignore_errors: yes

# 🔹 Deploy configs nuevas (con validación)
- name: Desplegar configuración de virtual hosts
  template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ item.name }}.conf"
    mode: "0644"
    validate: "nginx -t"
  loop: "{{ vhosts }}"
  notify: reload nginx

# 🔹 Habilitar vhosts
- name: Habilitar virtual hosts
  file:
    src: "/etc/nginx/sites-available/{{ item.name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item.name }}.conf"
    state: link
  loop: "{{ vhosts }}"
  notify: reload nginx

# 🔹 Eliminar default
- name: Eliminar default de nginx
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

# 🔹 Asegurar servicio activo
- name: Asegurar que Nginx está corriendo y habilitado
  service:
    name: nginx
    state: started
    enabled: yes

# 🔹 Validar nginx antes de certbot
- name: Validar configuración nginx
  command: nginx -t

# 🔹 Obtener certificados SSL (solo si no existen)
- name: Obtener certificado SSL
  command: >
    certbot --nginx
    -d {{ item.domain }}
    --non-interactive
    --agree-tos
    -m admin@{{ item.domain }}
    --redirect
  args:
    creates: "/etc/letsencrypt/live/{{ item.domain }}/fullchain.pem"
  loop: "{{ vhosts }}"

# 🔥 ROLLBACK automático si algo falla
- block:
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded

  rescue:
    - name: Restaurar configuración anterior
      copy:
        src: "/etc/nginx/backup_sites_available/"
        dest: "/etc/nginx/sites-available/"
        remote_src: yes

    - name: Reiniciar nginx con config anterior
      service:
        name: nginx
        state: restarted

    - name: Fallar ejecución
      fail:
        msg: "❌ Error en configuración de nginx. Se hizo rollback automático."
