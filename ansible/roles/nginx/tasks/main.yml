---
- name: Actualizar apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Instalar Nginx y Certbot
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present

# 🔹 Crear logs por sitio
- name: Crear directorio de logs por sitio
  file:
    path: "/var/log/nginx/{{ item.name }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop: "{{ vhosts }}"

# 🔹 Backup de configs actuales (para rollback)
- name: Backup de configuración actual de nginx
  copy:
    src: "/etc/nginx/sites-available/"
    dest: "/etc/nginx/backup_sites_available/"
    remote_src: yes
  ignore_errors: yes

# 🔥 BLOQUE PRINCIPAL (deploy seguro)
- block:
    # 🔹 Desplegar configs
    - name: Desplegar configuración de virtual hosts
      template:
        src: vhost.conf.j2
        dest: "/etc/nginx/sites-available/{{ item.name }}.conf"
        mode: "0644"
      loop: "{{ vhosts }}"

    # 🔹 Habilitar vhosts
    - name: Habilitar virtual hosts
      file:
        src: "/etc/nginx/sites-available/{{ item.name }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ item.name }}.conf"
        state: link
      loop: "{{ vhosts }}"

    # 🔹 Eliminar default
    - name: Eliminar default de nginx
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    # 🔹 Asegurar servicio activo
    - name: Asegurar que Nginx está corriendo y habilitado
      service:
        name: nginx
        state: started
        enabled: yes

    # 🔹 Validar nginx (CLAVE)
    - name: Validar configuración nginx
      command: nginx -t
      register: nginx_test
      changed_when: false

    # 🔹 Fallar si config inválida
    - name: Fallar si nginx config es inválida
      fail:
        msg: "❌ Configuración de nginx inválida"
      when: nginx_test.rc != 0

    # 🔹 Reload nginx solo si todo está bien
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded

    # 🔹 Certbot (solo si no existe cert)
    - name: Obtener certificado SSL
      command: >
        certbot --nginx
        -d {{ item.domain }}
        --non-interactive
        --agree-tos
        -m {{ certbot_email }}
        --redirect
      args:
        creates: "/etc/letsencrypt/live/{{ item.domain }}/fullchain.pem"
      loop: "{{ vhosts }}"

  rescue:
    # 🔥 ROLLBACK automático
    - name: Restaurar configuración anterior
      copy:
        src: "/etc/nginx/backup_sites_available/"
        dest: "/etc/nginx/sites-available/"
        remote_src: yes

    - name: Reiniciar nginx con config anterior
      service:
        name: nginx
        state: restarted

    - name: Fallar ejecución
      fail:
        msg: "❌ Error en configuración de nginx. Se hizo rollback automático."
