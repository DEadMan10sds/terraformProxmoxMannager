---
- name: Actualizar apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Instalar Nginx y Certbot
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present

- name: Eliminar sitio default de Nginx
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Crear directorio de logs por sitio
  file:
    path: "/var/log/nginx/{{ item.name }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop: "{{ vhosts }}"

- name: Desplegar configuración de virtual hosts
  template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ item.name }}.conf"
    mode: "0644"
  loop: "{{ vhosts }}"
  notify: reload nginx

- name: Habilitar virtual hosts
  file:
    src: "/etc/nginx/sites-available/{{ item.name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item.name }}.conf"
    state: link
  loop: "{{ vhosts }}"
  notify: reload nginx

- name: Asegurar que Nginx está corriendo y habilitado
  service:
    name: nginx
    state: started
    enabled: yes

- name: Habilitar vhosts
  file:
    src: "/etc/nginx/sites-available/{{ item.name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item.name }}.conf"
    state: link
  loop: "{{ vhosts }}"
  notify: reload nginx

- name: Eliminar default
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx


- name: Instalar certbot
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes

    - name: Obtener certificado SSL
  command: >
    certbot --nginx
    -d {{ item.domain }}
    --non-interactive
    --agree-tos
    -m admin@{{ item.domain }}
    --redirect
  args:
    creates: "/etc/letsencrypt/live/{{ item.domain }}/fullchain.pem"
  loop: "{{ vhosts }}"