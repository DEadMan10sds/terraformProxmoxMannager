- name: Instalar qemu-guest-agent en VMs
  apt:
    name: qemu-guest-agent
    state: present
    update_cache: yes
  when: ansible_virtualization_type == "kvm"

- name: Habilitar qemu-guest-agent
  systemd:
    name: qemu-guest-agent
    enabled: yes
    state: started
  when: ansible_virtualization_type == "kvm"

- name: Instalar paquetes base en LXC
  apt:
    name:
      - iproute2
      - net-tools
    state: present
    update_cache: yes
  when: ansible_virtualization_type == "lxc"
