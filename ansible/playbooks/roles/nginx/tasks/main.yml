---
- name: Actualizar apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Instalar Nginx y Certbot
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present

# 🔹 Crear logs por sitio
- name: Crear directorio de logs por sitio
  file:
    path: "/var/log/nginx/{{ item.name }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop: "{{ vhosts }}"

# 🔹 Backup de configs actuales
- name: Backup de configuración actual de nginx
  copy:
    src: "/etc/nginx/sites-available/"
    dest: "/etc/nginx/backup_sites_available/"
    remote_src: yes
  ignore_errors: yes

# ═══════════════════════════════════════
# FASE 1 — HTTP (para obtener el cert)
# ═══════════════════════════════════════
- block:
    - name: "[Fase 1] Desplegar vhost HTTP"
      template:
        src: vhost_http.conf.j2
        dest: "/etc/nginx/sites-available/{{ item.name }}.conf"
        mode: "0644"
      loop: "{{ vhosts }}"

    - name: "[Fase 1] Habilitar vhosts"
      file:
        src: "/etc/nginx/sites-available/{{ item.name }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ item.name }}.conf"
        state: link
      loop: "{{ vhosts }}"

    - name: Eliminar default de nginx
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Asegurar que Nginx está corriendo y habilitado
      service:
        name: nginx
        state: started
        enabled: yes

    - name: "[Fase 1] Validar nginx"
      command: nginx -t
      changed_when: false

    - name: "[Fase 1] Reload nginx"
      service:
        name: nginx
        state: reloaded

    # 🔹 Obtener cert solo si no existe
    - name: Obtener certificado SSL
      command: >
        certbot certonly --nginx
        -d {{ item.domain }}
        --non-interactive
        --agree-tos
        -m {{ certbot_email }}
      args:
        creates: "/etc/letsencrypt/live/{{ item.domain }}/fullchain.pem"
      loop: "{{ vhosts }}"

  rescue:
    - name: Restaurar configuración anterior
      copy:
        src: "/etc/nginx/backup_sites_available/"
        dest: "/etc/nginx/sites-available/"
        remote_src: yes

    - name: Reiniciar nginx con config anterior
      service:
        name: nginx
        state: restarted

    - name: Fallar ejecución
      fail:
        msg: "❌ Error en Fase 1 (HTTP/certbot). Se hizo rollback automático."

# ═══════════════════════════════════════
# FASE 2 — HTTPS (cert ya existe)
# ═══════════════════════════════════════
- block:
    - name: "[Fase 2] Desplegar vhost HTTPS completo"
      template:
        src: vhost_https.conf.j2
        dest: "/etc/nginx/sites-available/{{ item.name }}.conf"
        mode: "0644"
      loop: "{{ vhosts }}"

    - name: "[Fase 2] Validar nginx con config HTTPS"
      command: nginx -t
      changed_when: false

    - name: "[Fase 2] Reload nginx con HTTPS activo"
      service:
        name: nginx
        state: reloaded

    # 🔹 Configurar renovación automática
    - name: Asegurar que certbot timer está activo
      systemd:
        name: certbot.timer
        enabled: yes
        state: started

  rescue:
    - name: Restaurar configuración HTTP (fallback seguro)
      template:
        src: vhost_http.conf.j2
        dest: "/etc/nginx/sites-available/{{ item.name }}.conf"
        mode: "0644"
      loop: "{{ vhosts }}"

    - name: Reload nginx con HTTP
      service:
        name: nginx
        state: reloaded

    - name: Fallar ejecución
      fail:
        msg: "❌ Error en Fase 2 (HTTPS). Se restauró config HTTP como fallback."
