- name: Bootstrap SSH keys en VMs
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/secrets.yml

  tasks:
    - name: Instalar SSH key
      ansible.builtin.authorized_key:
        user: "{{ host.user }}"
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
      loop: "{{ qemuhosts }}"
      loop_control:
        loop_var: host
      delegate_to: "{{ host.ip }}"
      vars:
        ansible_user: "{{ host.user }}"
        ansible_password: "{{ host.password }}"
