- name: Construir inventario dinámico
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/generated.yml
    - ../vars/secrets.yml

  tasks:
    - name: Agregar hosts
      add_host:
        name: "{{ item.name }}"
        groups: bootstrap
        ansible_host: "{{ item.ip }}"
        ansible_user: "{{ item.user }}"
        ansible_password: "{{ passwords[item.name] }}"
      loop: "{{ qemu_hosts }}"

- name: Instalar SSH key en VMs
  hosts: bootstrap
  gather_facts: false

  tasks:
    - name: Agregar clave pública
      ansible.posix.authorized_key:
        user: "{{ ansible_user }}"
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
