- name: Construir inventario dinámico
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/secrets.yml

  tasks:
    - name: Agregar hosts al grupo bootstrap
      add_host:
        name: "{{ item.name }}"
        ansible_host: "{{ item.ip }}"
        ansible_user: "{{ item.user }}"
        ansible_ssh_pass: "{{ item.password }}"
      loop: "{{ qemuhosts }}"

# ---------------------------------------

- name: Instalar SSH key en VMs
  hosts: bootstrap
  become: true

  vars:
    ssh_public_key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

  tasks:
    - name: Asegurar carpeta .ssh
      file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"

    - name: Agregar clave pública
      authorized_key:
        user: "{{ ansible_user }}"
        key: "{{ ssh_public_key }}"
        state: present

    - name: Asegurar permisos correctos
      file:
        path: "/home/{{ ansible_user }}/.ssh/authorized_keys"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
