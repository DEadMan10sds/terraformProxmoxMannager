- name: Bootstrap SSH keys en VMs
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/secrets.yml

  tasks:
    - name: Instalar SSH key en cada VM
      ansible.builtin.authorized_key:
        user: "{{ item.user }}"
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
      loop: "{{ qemuhosts }}"
      delegate_to: "{{ item.ip }}"
      vars:
        ansible_user: "{{ item.user }}"
        ansible_password: "{{ item.password }}"
